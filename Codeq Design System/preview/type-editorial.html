<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:24px 32px;display:flex;flex-direction:column;gap:8px}
.spec{font-size:10px;color:var(--fg-4);letter-spacing:0.04em;text-transform:uppercase;font-weight:500}
.sample{font-family:'Inter',sans-serif;font-weight:700;color:#000;line-height:0.95;letter-spacing:-0.01em}
.note{font-size:12px;color:var(--fg-4);line-height:1.4}
</style></head><body>
<div class="card">
  <div class="spec">Inter Bold · editorial label · 150 in brandbook</div>
  <div class="sample" style="font-size:92px">Article</div>
  <div class="note">Reserved for oversized page labels on the template library ("Article", "Opinie", "UX Hacks"). Never mix with Poppins on the same line.</div>
</div>
</body></html>
