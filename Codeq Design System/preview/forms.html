<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:26px 32px;display:flex;flex-direction:column;gap:14px;max-width:420px}
label{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--fg-4);font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
input,textarea,select{font-family:inherit;font-size:15px;padding:12px 14px;border:1px solid #E0E3E6;border-radius:8px;background:#fff;color:#000;transition:border-color 180ms}
input:focus,textarea:focus{outline:none;border-color:#315AFB;box-shadow:0 0 0 3px rgba(49,90,251,0.15)}
input::placeholder{color:#9AA3B5}
</style></head><body>
<div class="card">
  <label>Name<input placeholder="Jane Kowalska"></label>
  <label>Email<input type="email" placeholder="you@company.com"></label>
  <label>Project brief<textarea rows="3" placeholder="Tell us about your project..."></textarea></label>
</div>
</body></html>
