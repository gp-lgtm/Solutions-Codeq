<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:24px 32px;display:flex;gap:18px;flex-wrap:wrap}
.r{display:flex;flex-direction:column;align-items:center;gap:8px}
.sq{width:72px;height:72px;background:var(--codeq-blue)}
.lab{font-size:11px;color:var(--fg-4);font-weight:500}
</style></head><body>
<div class="card">
  <div class="r"><div class="sq" style="border-radius:4px"></div><div class="lab">4 · xs</div></div>
  <div class="r"><div class="sq" style="border-radius:8px"></div><div class="lab">8 · sm</div></div>
  <div class="r"><div class="sq" style="border-radius:12px"></div><div class="lab">12 · md</div></div>
  <div class="r"><div class="sq" style="border-radius:20px"></div><div class="lab">20 · lg</div></div>
  <div class="r"><div class="sq" style="border-radius:28px"></div><div class="lab">28 · xl</div></div>
  <div class="r"><div class="sq" style="border-radius:999px"></div><div class="lab">pill</div></div>
</div>
</body></html>
