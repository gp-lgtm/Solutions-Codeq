<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
  .card{padding:28px 32px}
  .scale{display:grid;grid-template-columns:repeat(9,1fr);border-radius:10px;overflow:hidden;border:1px solid var(--border-1)}
  .step{height:80px;display:flex;align-items:flex-end;padding:8px;font-size:10px;color:#000}
  .step.dark{color:#fff}
</style></head><body>
<div class="card">
  <div class="scale">
    <div class="step" style="background:#F9FAFE">050</div>
    <div class="step" style="background:#F2F4FD">100</div>
    <div class="step" style="background:#E6EBFF">150</div>
    <div class="step" style="background:#DFE6FF">200</div>
    <div class="step" style="background:#C1CEFE">300</div>
    <div class="step dark" style="background:#98ADFD">400</div>
    <div class="step dark" style="background:#6F8CFC">500</div>
    <div class="step dark" style="background:#5073FC">600</div>
    <div class="step dark" style="background:#315AFB">700</div>
  </div>
</div>
</body></html>
