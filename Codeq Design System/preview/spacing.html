<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:24px 32px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;align-items:center;gap:14px}
.bar{height:14px;background:var(--codeq-blue);border-radius:3px}
.lab{font-size:11px;color:var(--fg-4);width:60px;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="card">
  <div class="row"><div class="lab">4</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="lab">8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="lab">12</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="lab">16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="lab">24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="lab">32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="lab">48</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="lab">64</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="lab">96</div><div class="bar" style="width:96px"></div></div>
  <div class="row"><div class="lab">200 · gutter</div><div class="bar" style="width:200px;background:var(--codeq-blue-deep)"></div></div>
</div>
</body></html>
