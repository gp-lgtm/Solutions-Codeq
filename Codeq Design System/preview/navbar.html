<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:0;display:flex;flex-direction:column}
.bar{display:flex;align-items:center;justify-content:space-between;padding:22px 40px;border-bottom:1px solid #E0E3E6;background:#fff}
.bar img{height:28px}
.menu{display:flex;gap:28px;font-size:14px;font-weight:500}
.menu a{color:#000}
.cta{background:#315AFB;color:#fff;padding:10px 22px;border-radius:999px;font-size:14px;font-weight:600;letter-spacing:0.02em}
.bar.dark{background:#315AFB;border-bottom:none}
.bar.dark a{color:#fff}
.bar.dark .cta{background:#fff;color:#315AFB}
</style></head><body>
<div class="card">
  <div class="bar">
    <img src="../assets/logo-blue.svg" alt="Codeq">
    <div class="menu"><a>Services</a><a>Work</a><a>About</a><a>Blog</a></div>
    <a class="cta">Start a project</a>
  </div>
  <div class="bar dark">
    <img src="../assets/logo-white.svg" alt="Codeq">
    <div class="menu"><a>Services</a><a>Work</a><a>About</a><a>Blog</a></div>
    <a class="cta">Start a project</a>
  </div>
</div>
</body></html>
