<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#F9FAFE;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:28px 32px;display:flex;gap:18px;flex-wrap:wrap}
.c{flex:1;min-width:200px;background:#fff;border:1px solid #E0E3E6;border-radius:12px;padding:20px}
.c .tag{display:inline-block;background:#E6EBFF;color:#315AFB;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;font-weight:600;padding:4px 10px;border-radius:999px}
.c h4{margin:12px 0 6px;font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:0.02em}
.c p{margin:0;font-size:13px;color:var(--fg-3);line-height:1.5}
.c.blue{background:#315AFB;color:#fff;border-color:#315AFB}
.c.blue .tag{background:rgba(255,255,255,0.2);color:#fff}
.c.blue p{color:rgba(255,255,255,0.85)}
</style></head><body>
<div class="card">
  <div class="c"><span class="tag">Case study</span><h4>Finansowy Piotr</h4><p>Conversion-focused WooCommerce rebuild for a finance advisor.</p></div>
  <div class="c blue"><span class="tag">Featured</span><h4>Shopify launch</h4><p>Headless Shopify storefront with bespoke checkout flow.</p></div>
</div>
</body></html>
