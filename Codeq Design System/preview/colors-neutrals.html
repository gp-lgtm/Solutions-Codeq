<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
  .card{padding:28px 32px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .swatch{width:110px;border:1px solid var(--border-1);border-radius:10px;overflow:hidden}
  .chip{height:70px}
  .meta{padding:10px 12px;font-size:12px}
  .meta b{display:block;font-weight:600;font-size:12px}
  .meta code{color:var(--fg-4);font-size:11px}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#000"></div><div class="meta"><b>Ink</b><code>#000000</code></div></div>
    <div class="swatch"><div class="chip" style="background:#061A44"></div><div class="meta"><b>Navy</b><code>#061A44</code></div></div>
    <div class="swatch"><div class="chip" style="background:#17313B"></div><div class="meta"><b>Muted</b><code>#17313B</code></div></div>
    <div class="swatch"><div class="chip" style="background:#3674A2"></div><div class="meta"><b>Subdued</b><code>#3674A2</code></div></div>
    <div class="swatch"><div class="chip" style="background:#E0E3E6"></div><div class="meta"><b>Border</b><code>#E0E3E6</code></div></div>
    <div class="swatch"><div class="chip" style="background:#F9FAFE;border-right:1px solid #e0e3e6"></div><div class="meta"><b>Surface</b><code>#F9FAFE</code></div></div>
  </div>
</div>
</body></html>
