<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:28px 32px;display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.block{display:flex;flex-direction:column;align-items:center;gap:10px}
.block img{height:60px}
.bg{background:#315AFB;padding:20px 28px;border-radius:12px}
.bg img{height:60px}
.small img{height:40px}
.sy{display:flex;gap:12px;align-items:center}
.sy .s{width:64px;height:64px;background:#315AFB;border-radius:12px;display:flex;align-items:center;justify-content:center}
.sy .s img{height:40px}
.lab{font-size:10px;color:var(--fg-4);text-transform:uppercase;letter-spacing:0.04em;font-weight:500}
</style></head><body>
<div class="card">
  <div class="block"><img src="../assets/logo-blue.svg"><div class="lab">Logo · primary</div></div>
  <div class="block bg"><img src="../assets/logo-white.svg"></div>
  <div class="block"><img src="../assets/sygnet-blue.svg" style="height:60px"><div class="lab">Sygnet</div></div>
  <div class="block sy"><div class="s"><img src="../assets/sygnet-white.svg"></div></div>
</div>
</body></html>
