<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:24px 32px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:baseline;gap:20px;border-bottom:1px solid var(--border-1);padding-bottom:10px}
.spec{font-size:10px;color:var(--fg-4);letter-spacing:0.04em;text-transform:uppercase;width:160px;flex:none;font-weight:500}
p{margin:0;color:#000}
</style></head><body>
<div class="card">
  <div class="row"><div class="spec">Body · Poppins 400 · 20</div><p style="font-size:20px;line-height:1.55">Codeq builds for business impact with a focus on the Discovery phase.</p></div>
  <div class="row"><div class="spec">Body sm · 16</div><p style="font-size:16px;line-height:1.55">Codeq builds for business impact with a focus on the Discovery phase.</p></div>
  <div class="row"><div class="spec">Small · 14</div><p style="font-size:14px;line-height:1.5;color:var(--fg-3)">Supporting copy and metadata.</p></div>
  <div class="row"><div class="spec">Caption · 12 · UPPER</div><p style="font-size:12px;letter-spacing:0.04em;text-transform:uppercase;color:var(--fg-4);font-weight:500">Case study · 2024</p></div>
</div>
</body></html>
