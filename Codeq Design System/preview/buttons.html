<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:28px 32px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.btn{font-family:var(--font-display);font-weight:600;font-size:16px;letter-spacing:0.02em;padding:14px 28px;border-radius:999px;border:none;cursor:pointer;transition:all 220ms cubic-bezier(.22,1,.36,1)}
.primary{background:#315AFB;color:#fff}
.primary:hover{background:#1F3FF9;box-shadow:0 10px 40px rgba(49,90,251,0.35)}
.secondary{background:transparent;color:#315AFB;border:1.5px solid #315AFB}
.secondary:hover{background:#315AFB;color:#fff}
.ghost{background:transparent;color:#000;border:1.5px solid #E0E3E6}
.ghost:hover{border-color:#000}
.dark{background:#000;color:#fff}
.dark:hover{background:#17313B}
</style></head><body>
<div class="card">
  <button class="btn primary">Start a project</button>
  <button class="btn secondary">Read case study</button>
  <button class="btn ghost">Learn more</button>
  <button class="btn dark">Contact us</button>
</div>
</body></html>
