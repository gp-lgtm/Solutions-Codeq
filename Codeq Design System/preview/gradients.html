<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:0;position:relative;height:260px;overflow:hidden;background:#fff}
.shape{position:absolute;pointer-events:none}
.a{left:-10%;top:-30%;width:80%;height:140%;transform:rotate(-18deg);background:linear-gradient(180deg, rgba(49,90,251,0.27) 4%, rgba(193,206,254,0) 99%);border-radius:40% 60% 50% 50% / 40% 40% 60% 60%}
.b{right:-20%;bottom:-40%;width:90%;height:160%;transform:rotate(28deg);background:linear-gradient(180deg, rgba(49,90,251,0.22) 4%, rgba(193,206,254,0) 99%);border-radius:40% 60% 50% 50% / 40% 40% 60% 60%}
.cap{position:absolute;left:32px;top:32px;font-size:14px;color:var(--fg-3);font-weight:500;max-width:380px;line-height:1.4}
.cap b{color:#000;font-weight:700}
</style></head><body>
<div class="card">
  <div class="shape a"></div>
  <div class="shape b"></div>
  <div class="cap"><b>Signature gradient motif.</b> Organic blue shapes bleed off the frame at opposing diagonals. Layer 2–3 at varying opacity (0.27 / 0.22 / 0.15).</div>
</div>
</body></html>
