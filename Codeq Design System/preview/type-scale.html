<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:24px 32px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:baseline;gap:20px;border-bottom:1px solid var(--border-1);padding-bottom:10px}
.spec{font-size:10px;color:var(--fg-4);letter-spacing:0.04em;text-transform:uppercase;width:150px;flex:none;font-weight:500}
.sample{font-family:var(--font-display);letter-spacing:0.02em;color:#000;line-height:1.1}
</style></head><body>
<div class="card">
  <div class="row"><div class="spec">H1 · Poppins 700 · 60</div><div class="sample" style="font-size:50px;font-weight:700">Display Heading 01</div></div>
  <div class="row"><div class="spec">H2 · Poppins 700 · 50</div><div class="sample" style="font-size:42px;font-weight:700">Display Heading 02</div></div>
  <div class="row"><div class="spec">H3 · Poppins 600 · 30</div><div class="sample" style="font-size:30px;font-weight:600">Section heading</div></div>
  <div class="row"><div class="spec">Lead · Poppins 400 · 22</div><div class="sample" style="font-size:22px;font-weight:400;letter-spacing:0.02em">Lead paragraph text</div></div>
</div>
</body></html>
