<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
  .card{padding:28px 32px;display:flex;flex-direction:column;gap:18px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .swatch{width:120px;border:1px solid var(--border-1);border-radius:10px;overflow:hidden;background:#fff}
  .chip{height:76px}
  .meta{padding:10px 12px;font-size:12px;line-height:1.3}
  .meta b{display:block;font-weight:600;font-size:13px;color:var(--fg-1);letter-spacing:0}
  .meta code{color:var(--fg-4);font-size:11px}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#315AFB"></div><div class="meta"><b>Codeq Blue</b><code>#315AFB</code></div></div>
    <div class="swatch"><div class="chip" style="background:#1F3FF9"></div><div class="meta"><b>Deep</b><code>#1F3FF9</code></div></div>
    <div class="swatch"><div class="chip" style="background:#2C52FA"></div><div class="meta"><b>Dark</b><code>#2C52FA</code></div></div>
    <div class="swatch"><div class="chip" style="background:#132EF8"></div><div class="meta"><b>Bright</b><code>#132EF8</code></div></div>
    <div class="swatch"><div class="chip" style="background:#1B12F5"></div><div class="meta"><b>Ink</b><code>#1B12F5</code></div></div>
  </div>
</div>
</body></html>
