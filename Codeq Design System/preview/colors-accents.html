<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
  .card{padding:28px 32px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .swatch{width:108px;border:1px solid var(--border-1);border-radius:10px;overflow:hidden}
  .chip{height:70px}
  .meta{padding:10px 12px;font-size:12px}
  .meta b{display:block;font-weight:600;font-size:12px}
  .meta code{color:var(--fg-4);font-size:11px}
  p{margin:0 0 10px 0;font-size:12px;color:var(--fg-4)}
</style></head><body>
<div class="card">
  <p>Used sparingly — max one accent at a time.</p>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#EF9645"></div><div class="meta"><b>Amber</b><code>#EF9645</code></div></div>
    <div class="swatch"><div class="chip" style="background:#F99E23"></div><div class="meta"><b>Orange</b><code>#F99E23</code></div></div>
    <div class="swatch"><div class="chip" style="background:#FFDC5D"></div><div class="meta"><b>Yellow</b><code>#FFDC5D</code></div></div>
    <div class="swatch"><div class="chip" style="background:#3EBEB3"></div><div class="meta"><b>Teal</b><code>#3EBEB3</code></div></div>
    <div class="swatch"><div class="chip" style="background:#5DADEC"></div><div class="meta"><b>Sky</b><code>#5DADEC</code></div></div>
    <div class="swatch"><div class="chip" style="background:#EF4335"></div><div class="meta"><b>Red</b><code>#EF4335</code></div></div>
  </div>
</div>
</body></html>
