<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1)}
.card{padding:26px 32px;display:flex;gap:10px;flex-wrap:wrap}
.pill{font-size:12px;padding:6px 14px;border-radius:999px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
.p1{background:#315AFB;color:#fff}
.p2{background:#E6EBFF;color:#315AFB}
.p3{background:#000;color:#fff}
.p4{background:transparent;color:#000;border:1.5px solid #000}
.p5{background:#FFDC5D;color:#000}
.p6{background:#3EBEB3;color:#fff}
</style></head><body>
<div class="card">
  <span class="pill p1">Case study</span>
  <span class="pill p2">Shopify</span>
  <span class="pill p3">New</span>
  <span class="pill p4">WooCommerce</span>
  <span class="pill p5">UX</span>
  <span class="pill p6">Low code</span>
</div>
</body></html>
